name: manager-komodo

networks:
  manager-komodo:
    name: manager-komodo

volumes:
  stepca-data:
  headscale-data:
  victoriametrics-data:
  alertmanager-data:
  alertmanager-config:   # holds the rendered alertmanager.yml (from .env via alertmanager-init)
  grafana-data:
  headplane-data:
  komodo-postgres-data:
  komodo-ferretdb-state:
  komodo-core-keys:
  komodo-core-backups:

services:
  step-ca:
    image: smallstep/step-ca:0.30.2         # última estável (2026-03-23)
    container_name: manager-step-ca
    restart: unless-stopped
    networks: [manager-komodo]
    environment:
      DOCKER_STEPCA_INIT_NAME: "${STEPCA_NAME}"
      DOCKER_STEPCA_INIT_DNS_NAMES: "step-ca,step-ca.apps.internal,localhost,127.0.0.1"
      DOCKER_STEPCA_INIT_ACME: "true"
      DOCKER_STEPCA_INIT_REMOTE_MANAGEMENT: "true"
      DOCKER_STEPCA_INIT_PASSWORD: "${STEPCA_INIT_PASSWORD}"
    volumes:
      - stepca-data:/home/step
    # Para validar challenges ACME TLS-ALPN de *.apps.internal, o step-ca precisa de resolver
    # esses nomes e alcançar o entrypoint interno do Traefik (100.64.0.1:443). O container está
    # na bridge Docker sem MagicDNS, por isso mapeia-se cada nome interno → IP mesh do host.
    # Acrescentar aqui cada serviço interno novo (ex.: vm/grafana/komodo.apps.internal).
    extra_hosts:
      - "step-ca.apps.internal:100.64.0.1"
      - "vm.apps.internal:100.64.0.1"
      - "grafana.apps.internal:100.64.0.1"
      - "komodo.apps.internal:100.64.0.1"
      - "headplane.apps.internal:100.64.0.1"
      - "tailscale.apps.internal:100.64.0.1"
      - "home.apps.internal:100.64.0.1"
      - "apps.internal:100.64.0.1"
      - "alertmanager.apps.internal:100.64.0.1"
      - "vmalert.apps.internal:100.64.0.1"
    # Escuta :9000 só na rede Docker — NÃO publicado no host.
    # Exposto na mesh via router TCP com TLS passthrough: os operadores fazem
    # `step ca bootstrap --ca-url https://step-ca.apps.internal` (a própria TLS do step-ca
    # é preservada, para o pinning do fingerprint da raiz funcionar).
    labels:
      - "traefik.enable=true"
      - "traefik.tcp.routers.stepca.rule=HostSNI(`step-ca.apps.internal`)"
      - "traefik.tcp.routers.stepca.entrypoints=websecure-internal"
      - "traefik.tcp.routers.stepca.tls.passthrough=true"
      - "traefik.tcp.services.stepca.loadbalancer.server.port=9000"
    healthcheck:
      test: ["CMD", "step", "ca", "health", "--ca-url", "https://127.0.0.1:9000",
              "--root", "/home/step/certs/root_ca.crt"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  # docker-socket-proxy — read-only Docker API in front of Traefik. Traefik never touches the raw
  # socket, so a Traefik compromise can't reach root via docker.sock. Only read endpoints proxied.
  socket-proxy:
    image: ghcr.io/tecnativa/docker-socket-proxy:v0.4.2   # última estável (2026)
    container_name: manager-socket-proxy
    restart: unless-stopped
    networks: [manager-komodo]
    environment:
      CONTAINERS: "1"     # Traefik lists/inspects containers to read router labels
      NETWORKS: "1"       # container network settings
      EVENTS: "1"         # watch container start/stop to update routes
      PING: "1"
      VERSION: "1"
      POST: "0"           # deny all writes (create/exec/restart/…) — everything else defaults to 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  traefik:
    image: traefik:v3.7.7                    # última estável (2026-07-08)
    container_name: manager-traefik
    restart: unless-stopped
    depends_on:
      step-ca:
        condition: service_healthy
      socket-proxy:
        condition: service_started
    networks: [manager-komodo]
    ports:
      # Público no IP específico (não 0.0.0.0) para coexistir com o interno no mesmo porto 443.
      - "${PUBLIC_IP}:443:443"              # websecure-public (internet)
      - "100.64.0.1:443:8443"               # websecure-internal, só mesh (Tailscale IP do host)
    volumes:
      # No docker.sock here — Traefik reads the Docker API via socket-proxy (tcp, read-only).
      - ./docker/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./docker/traefik/dynamic:/etc/traefik/dynamic:ro
      - ./docker/traefik/certs:/certs       # acme-*.json (Traefik cria a 600) + step-ca-root.crt

  # Headscale — coordenador WireGuard. Único serviço público (via router `control` no
  # entrypoint público). CLI via `docker exec manager-headscale headscale ...`.
  headscale:
    image: headscale/headscale:v0.29.2       # última estável (2026-07-01)
    container_name: manager-headscale
    restart: unless-stopped
    command: serve
    networks: [manager-komodo]
    volumes:
      - ./docker/headscale/config.yaml:/etc/headscale/config.yaml:ro
      - ./docker/headscale/acl.hujson:/etc/headscale/acl.hujson:ro
      - headscale-data:/var/lib/headscale
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.control.rule=Host(`${PUBLIC_DOMAIN}`)"
      - "traefik.http.routers.control.entrypoints=websecure-public"
      - "traefik.http.routers.control.tls.certresolver=le"
      - "traefik.http.routers.control.priority=1"   # host-only; /provisioning (prio 100) wins
      - "traefik.http.services.control.loadbalancer.server.port=8080"


  # Headplane — web UI for Headscale (node management). Internal only, reachable over the mesh at
  # headplane.apps.internal / tailscale.apps.internal (step-ca cert). Docker integration OFF (see
  # docker/headplane/config.yaml). Node ops via the Headscale HTTP API using HEADPLANE_API_KEY.
  headplane:
    image: ghcr.io/tale/headplane:0.7.0      # última estável (2026-07-04)
    container_name: manager-headplane
    restart: unless-stopped
    depends_on: [headscale]
    networks: [manager-komodo]
    environment:
      # v0.7: env overrides are always applied (HEADPLANE_<SECTION>__<KEY>); no enable flag needed.
      HEADPLANE_SERVER__COOKIE_SECRET: "${HEADPLANE_COOKIE_SECRET}"
      HEADPLANE_SERVER__BASE_URL: "${HEADPLANE_BASE_URL}"
      HEADPLANE_HEADSCALE__API_KEY: "${HEADPLANE_API_KEY}"
    volumes:
      - ./docker/headplane/config.yaml:/etc/headplane/config.yaml:ro
      - ./docker/headscale/config.yaml:/etc/headscale/config.yaml:ro   # read-only: display/validate
      - headplane-data:/var/lib/headplane
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.headplane.rule=Host(`headplane.apps.internal`) || Host(`tailscale.apps.internal`)"
      - "traefik.http.routers.headplane.entrypoints=websecure-internal"
      - "traefik.http.routers.headplane.tls.certresolver=stepca"
      - "traefik.http.routers.headplane.middlewares=headplane-toadmin"
      # Headplane serves under /admin; redirect the bare host root there for convenience.
      - "traefik.http.middlewares.headplane-toadmin.redirectregex.regex=^(https://[^/]+)/?$$"
      - "traefik.http.middlewares.headplane-toadmin.redirectregex.replacement=$${1}/admin"
      - "traefik.http.services.headplane.loadbalancer.server.port=3000"

  # Homepage — landing page linking every web-manageable service. Internal only (home.apps.internal
  # via step-ca). Static config in docker/homepage/*.yaml (no docker.sock). v1 requires
  # HOMEPAGE_ALLOWED_HOSTS. siteMonitor pings each service over the internal Docker network (http).
  homepage:
    image: ghcr.io/gethomepage/homepage:v1.13.2   # última estável (2026)
    container_name: manager-homepage
    restart: unless-stopped
    networks: [manager-komodo]
    environment:
      HOMEPAGE_ALLOWED_HOSTS: "home.apps.internal,apps.internal"
    volumes:
      - ./docker/homepage:/app/config
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.homepage.rule=Host(`home.apps.internal`) || Host(`apps.internal`)"
      - "traefik.http.routers.homepage.entrypoints=websecure-internal"
      - "traefik.http.routers.homepage.tls.certresolver=stepca"
      - "traefik.http.services.homepage.loadbalancer.server.port=3000"

  # Provisioning — one-time web delivery of host onboarding scripts (see add-host.sh).
  # Public ONLY under /provisioning on the same domain (path router, priority > control).
  # Non-root, read-only rootfs; only the store (per-host scripts with baked one-shot keys) is rw.
  provisioning:
    image: python:3.13-slim
    container_name: manager-provisioning
    restart: unless-stopped
    networks: [manager-komodo]
    user: "1000:1000"
    read_only: true
    tmpfs:
      - /tmp
    command: ["python3", "/app/server.py"]
    environment:
      STORE_DIR: /store
      LISTEN_PORT: "8000"
      KOMODO_CORE_URL: "http://komodo-core:9120"
      KOMODO_API_KEY: "${KOMODO_API_KEY}"
      KOMODO_API_SECRET: "${KOMODO_API_SECRET}"
      ALERTMANAGER_URL: "http://alertmanager:9093"   # target for the Komodo alert relay
      # Auto-created per-host deploy Repo (SEGCORE). Only for hosts onboarded with this role.
      APP_DEPLOY_ROLE: "segcore"
      APP_GIT_ACCOUNT: "jquelhas"
      APP_GIT_REPO: "jquelhas/GIMSv2"
      APP_GIT_BRANCH: "main"
      APP_PATH: "/opt/SEGCORE"
      APP_ON_PULL: "./scripts/update.sh"
      APP_TAG: "segcore"
    volumes:
      - ./provisioning/server.py:/app/server.py:ro
      - ./provisioning/store:/store         # rw: burn deletes entries
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.provisioning.rule=Host(`${PUBLIC_DOMAIN}`) && PathPrefix(`/provisioning`)"
      - "traefik.http.routers.provisioning.entrypoints=websecure-public"
      - "traefik.http.routers.provisioning.tls.certresolver=le"
      - "traefik.http.routers.provisioning.priority=100"
      - "traefik.http.routers.provisioning.middlewares=provisioning-ratelimit"
      - "traefik.http.middlewares.provisioning-ratelimit.ratelimit.average=10"
      - "traefik.http.middlewares.provisioning-ratelimit.ratelimit.period=1m"
      - "traefik.http.middlewares.provisioning-ratelimit.ratelimit.burst=5"
      - "traefik.http.services.provisioning.loadbalancer.server.port=8000"

  # VictoriaMetrics — single-node TSDB + PromQL. Internal only (vm.apps.internal via step-ca).
  # Scrapes app hosts directly over the mesh; targets via file_sd.
  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.147.0   # latest stable (2026)
    container_name: manager-victoriametrics
    restart: unless-stopped
    networks: [manager-komodo]
    command:
      - "-promscrape.config=/etc/victoriametrics/scrape.yml"
      - "-promscrape.configCheckInterval=30s"
      - "-promscrape.httpSDCheckInterval=30s"   # how often http_sd (gims discovery) is refreshed
      - "-retentionPeriod=60d"
      - "-httpListenAddr=:8428"
    volumes:
      - victoriametrics-data:/victoria-metrics-data
      - ./docker/victoriametrics/scrape.yml:/etc/victoriametrics/scrape.yml:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vm.rule=Host(`vm.apps.internal`)"
      - "traefik.http.routers.vm.entrypoints=websecure-internal"
      - "traefik.http.routers.vm.tls.certresolver=stepca"
      - "traefik.http.services.vm.loadbalancer.server.port=8428"

  # vmalert — evaluates recording/alerting rules against VM, writes results back to VM.
  vmalert:
    image: victoriametrics/vmalert:v1.147.0            # matches VM version
    container_name: manager-vmalert
    restart: unless-stopped
    depends_on: [victoriametrics, alertmanager]
    networks: [manager-komodo]
    command:
      - "-datasource.url=http://victoriametrics:8428"
      - "-remoteWrite.url=http://victoriametrics:8428"
      - "-remoteRead.url=http://victoriametrics:8428"
      - "-notifier.url=http://alertmanager:9093"   # fire alerting rules to the notification hub
      - "-rule=/etc/vmalert/rules/apps/*.yml"
      - "-rule=/etc/vmalert/rules/platform/*.yml"
      - "-configCheckInterval=30s"   # hot-reload rule files on change
      - "-httpListenAddr=:8880"
      - "-external.url=https://vmalert.apps.internal"   # correct absolute links in the vmalert UI
    volumes:
      - ./docker/vmalert/rules:/etc/vmalert/rules:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vmalert.rule=Host(`vmalert.apps.internal`)"
      - "traefik.http.routers.vmalert.entrypoints=websecure-internal"
      - "traefik.http.routers.vmalert.tls.certresolver=stepca"
      - "traefik.http.services.vmalert.loadbalancer.server.port=8880"

  # alertmanager-init — renders the config template with the SMTP_* / ALERT_EMAIL_TO vars from .env
  # (Alertmanager can't expand env itself) into the shared config volume, then exits. Reuses the
  # python image already pulled for provisioning; os.path.expandvars is stdlib (no extra packages).
  alertmanager-init:
    image: python:3.13-slim
    container_name: manager-alertmanager-init
    restart: "no"
    environment:
      SMTP_SMARTHOST: "${SMTP_SMARTHOST}"
      SMTP_FROM: "${SMTP_FROM}"
      SMTP_AUTH_USERNAME: "${SMTP_AUTH_USERNAME}"
      SMTP_AUTH_PASSWORD: "${SMTP_AUTH_PASSWORD}"
      SMTP_REQUIRE_TLS: "${SMTP_REQUIRE_TLS}"
      ALERT_EMAIL_TO: "${ALERT_EMAIL_TO}"
    volumes:
      - ./docker/alertmanager/alertmanager.yml.tmpl:/tmpl.yml:ro
      - alertmanager-config:/out
    command:
      - python3
      - -c
      - "import os; open('/out/alertmanager.yml','w').write(os.path.expandvars(open('/tmpl.yml').read()))"

  # Alertmanager — single notification hub (SMTP). Receives app alerts from vmalert and infra
  # alerts from Komodo (via the provisioning /alert/komodo relay). UI at alertmanager.apps.internal.
  alertmanager:
    image: prom/alertmanager:v0.28.1               # latest stable (2025)
    container_name: manager-alertmanager
    restart: unless-stopped
    depends_on:
      alertmanager-init:
        condition: service_completed_successfully
    networks: [manager-komodo]
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
      - "--web.external-url=https://alertmanager.apps.internal"   # correct links in UI/notifications
    volumes:
      - alertmanager-config:/etc/alertmanager:ro
      - alertmanager-data:/alertmanager
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.alertmanager.rule=Host(`alertmanager.apps.internal`)"
      - "traefik.http.routers.alertmanager.entrypoints=websecure-internal"
      - "traefik.http.routers.alertmanager.tls.certresolver=stepca"
      - "traefik.http.services.alertmanager.loadbalancer.server.port=9093"

  # Grafana — central dashboards. Internal only (grafana.apps.internal via step-ca).
  grafana:
    image: grafana/grafana:13.1.0                      # OSS edition; latest stable (2026-07-01)
    container_name: manager-grafana
    restart: unless-stopped
    depends_on: [victoriametrics]
    networks: [manager-komodo]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD}"
      GF_SERVER_ROOT_URL: "https://grafana.apps.internal"
      GF_SERVER_DOMAIN: "grafana.apps.internal"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.apps.internal`)"
      - "traefik.http.routers.grafana.entrypoints=websecure-internal"
      - "traefik.http.routers.grafana.tls.certresolver=stepca"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"

  # Komodo Core datastore. MongoDB is NOT usable here: it refuses to start on Linux kernel
  # >= 6.19 (this VPS runs 7.0) — MongoDB SERVER-121912. So we use FerretDB, a MongoDB-wire
  # compatible engine backed by PostgreSQL+DocumentDB, which Komodo officially supports.
  komodo-postgres:
    image: ghcr.io/ferretdb/postgres-documentdb:17-0.107.0-ferretdb-2.7.0  # matches FerretDB 2.7.0
    container_name: manager-komodo-postgres
    restart: unless-stopped
    networks: [manager-komodo]
    environment:
      POSTGRES_USER: "${KOMODO_DATABASE_USERNAME}"
      POSTGRES_PASSWORD: "${KOMODO_DATABASE_PASSWORD}"
      POSTGRES_DB: postgres
    volumes:
      - komodo-postgres-data:/var/lib/postgresql/data

  komodo-ferretdb:
    image: ghcr.io/ferretdb/ferretdb:2.7.0             # MongoDB-compatible; latest stable
    container_name: manager-komodo-ferretdb
    restart: unless-stopped
    depends_on: [komodo-postgres]
    networks: [manager-komodo]
    environment:
      FERRETDB_POSTGRESQL_URL: "postgres://${KOMODO_DATABASE_USERNAME}:${KOMODO_DATABASE_PASSWORD}@komodo-postgres:5432/postgres"
      FERRETDB_TELEMETRY: disable
    volumes:
      - komodo-ferretdb-state:/state

  # Komodo Core — deploy orchestration UI/API. Internal only (komodo.apps.internal via step-ca).
  # v2 auth is key-pair based (core.pub / periphery.pub); host periphery trust is set up at
  # onboarding (step 5), not here. No docker.sock on Core (only peripheries need it).
  komodo-core:
    image: ghcr.io/moghtech/komodo-core:2.2.0          # latest stable (2026-05-07)
    container_name: manager-komodo-core
    restart: unless-stopped
    depends_on: [komodo-ferretdb]
    networks: [manager-komodo]
    environment:
      TZ: "Etc/UTC"
      KOMODO_DATABASE_ADDRESS: "komodo-ferretdb:27017"
      KOMODO_DATABASE_USERNAME: "${KOMODO_DATABASE_USERNAME}"
      KOMODO_DATABASE_PASSWORD: "${KOMODO_DATABASE_PASSWORD}"
      KOMODO_HOST: "https://komodo.apps.internal"
      KOMODO_TITLE: "Komodo — manager-komodo"
      KOMODO_LOCAL_AUTH: "true"
      KOMODO_INIT_ADMIN_USERNAME: "${KOMODO_INIT_ADMIN_USERNAME}"
      KOMODO_INIT_ADMIN_PASSWORD: "${KOMODO_INIT_ADMIN_PASSWORD}"
      KOMODO_WEBHOOK_SECRET: "${KOMODO_WEBHOOK_SECRET}"
      KOMODO_JWT_SECRET: "${KOMODO_JWT_SECRET}"
      KOMODO_DISABLE_USER_REGISTRATION: "true"
    volumes:
      - komodo-core-keys:/config/keys
      - komodo-core-backups:/backups
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.komodo.rule=Host(`komodo.apps.internal`)"
      - "traefik.http.routers.komodo.entrypoints=websecure-internal"
      - "traefik.http.routers.komodo.tls.certresolver=stepca"
      - "traefik.http.services.komodo.loadbalancer.server.port=9120"
