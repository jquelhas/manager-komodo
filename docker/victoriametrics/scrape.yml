# VictoriaMetrics scrape configuration (Prometheus format).
# Passed to VM via -promscrape.config; VM hot-reloads on change
# (-promscrape.configCheckInterval). GIMS app-host targets are discovered dynamically via
# http_sd from the provisioning service, which derives them from the Komodo server list — a
# host is scraped as soon as it's a Komodo Server and drops off when removed (no manual targets).
global:
  scrape_interval: 15s

scrape_configs:
  # Self-monitoring of the control plane's own metrics stack.
  - job_name: 'victoriametrics'
    static_configs:
      - targets: ['victoriametrics:8428']

  - job_name: 'vmalert'
    static_configs:
      - targets: ['vmalert:8880']

  # GIMS app hosts — discovered from the Komodo server list via the provisioning service.
  - job_name: 'gims-backend'
    metrics_path: /metrics
    scrape_interval: 10s
    http_sd_configs:
      - url: 'http://provisioning:8000/sd/gims/backend'

  - job_name: 'gims-postgresql'
    http_sd_configs:
      - url: 'http://provisioning:8000/sd/gims/postgresql'
