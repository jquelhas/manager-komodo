# VictoriaMetrics scrape configuration (Prometheus format).
# Passed to VM via -promscrape.config; VM hot-reloads on change
# (-promscrape.configCheckInterval). App-host targets use file_sd so adding a
# host is just editing a target file — no VM restart.
global:
  scrape_interval: 15s

scrape_configs:
  # Self-monitoring of the control plane's own metrics stack.
  - job_name: 'victoriametrics'
    static_configs:
      - targets: ['victoriametrics:8428']

  - job_name: 'vmalert'
    static_configs:
      - targets: ['vmalert:8880']

  # GIMS app hosts — targets populated via file_sd as hosts join the mesh.
  - job_name: 'gims-backend'
    metrics_path: /metrics
    scrape_interval: 10s
    file_sd_configs:
      - files: ['/etc/prometheus-targets/apps/gims/backend.yml']

  - job_name: 'gims-postgresql'
    file_sd_configs:
      - files: ['/etc/prometheus-targets/apps/gims/postgresql.yml']
