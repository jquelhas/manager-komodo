# All web-manageable services of the control plane. `href` is the mesh URL (browser, step-ca cert);
# `siteMonitor` uses the internal Docker-network endpoint (http, container name) for live up/down —
# this avoids TLS/step-ca trust issues inside the Homepage container.
- Control plane:
    - Komodo:
        href: https://komodo.apps.internal
        description: Deploy orchestration (servers, repos, procedures)
        icon: komodo.png
        siteMonitor: http://manager-komodo-core:9120
    - Headplane:
        href: https://headplane.apps.internal/admin
        description: Headscale mesh UI (nodes, ACL)
        icon: headscale.png
        siteMonitor: http://manager-headplane:3000/admin

- Observability:
    - Grafana:
        href: https://grafana.apps.internal
        description: Dashboards & metrics
        icon: grafana.png
        siteMonitor: http://manager-grafana:3000
    - VictoriaMetrics:
        href: https://vm.apps.internal
        description: Metrics TSDB (vmui, targets)
        icon: victoriametrics.png
        siteMonitor: http://manager-victoriametrics:8428
    - Alertmanager:
        href: https://alertmanager.apps.internal
        description: Alert routing & silences
        icon: alertmanager.png
        siteMonitor: http://manager-alertmanager:9093
    - vmalert:
        href: https://vmalert.apps.internal
        description: Alerting/recording rules state
        icon: victoriametrics.png
        siteMonitor: http://manager-vmalert:8880
